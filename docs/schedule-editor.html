<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Routine triggers · Paperclip</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root {
        color-scheme: light;
        --background: #ffffff;
        --foreground: #252525;
        --card: #ffffff;
        --primary: #343434;
        --primary-fg: #fafafa;
        --secondary: #f5f5f5;
        --muted: #f5f5f5;
        --muted-fg: #8f8f8f;
        --accent: #f5f5f5;
        --border: #e8e8e8;
        --input: #e8e8e8;
        --ring: #b3b3b3;
        --destructive: #d4183d;
        --switch-on: #16a34a;
        /* Tailwind v4 shadow tokens, matching Paperclip exactly */
        --shadow-xs: 0 1px 2px 0 rgb(0 0 0 / 0.05);
        --shadow-sm: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
        --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
      }
      html, body {
        background: var(--background);
        color: var(--foreground);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          Roboto, "Helvetica Neue", Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      .mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono",
          "Courier New", monospace;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        box-shadow: var(--shadow-sm);
      }
      .input, .select {
        height: 36px;
        border: 1px solid var(--input);
        border-radius: 8px;
        background: transparent;
        padding: 0 12px;
        font-size: 14px;
        color: var(--foreground);
        outline: none;
        transition: box-shadow 0.12s, border-color 0.12s;
        width: 100%;
        box-shadow: var(--shadow-xs);
      }
      .input:focus, .select:focus {
        border-color: var(--ring);
        box-shadow: 0 0 0 3px rgb(179 179 179 / 0.5);
      }
      .input.invalid {
        border-color: var(--destructive);
        box-shadow: 0 0 0 3px rgb(212 24 61 / 0.2);
      }
      .select {
        padding-right: 30px;
        appearance: none;
        background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='%238f8f8f' d='M0 0l5 6 5-6z'/></svg>");
        background-repeat: no-repeat;
        background-position: right 10px center;
      }
      .label { font-size: 14px; font-weight: 500; line-height: 1; }
      .sublabel { font-size: 13px; font-weight: 500; color: var(--foreground); line-height: 1; }
      .hint { font-size: 12px; color: var(--muted-fg); }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        height: 36px;
        padding: 0 16px;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 500;
        border: 1px solid transparent;
        cursor: pointer;
        background: transparent;
        color: var(--foreground);
        transition: background 0.12s, border-color 0.12s, color 0.12s, opacity 0.12s;
      }
      .btn:disabled { opacity: 0.5; pointer-events: none; }
      .btn-primary { background: var(--primary); color: var(--primary-fg); }
      .btn-primary:hover { background: rgb(52 52 52 / 0.9); }
      .btn-outline { border-color: var(--border); background: var(--background); box-shadow: var(--shadow-xs); }
      .btn-outline:hover { background: var(--accent); }
      .btn-ghost { color: var(--foreground); }
      .btn-ghost:hover { background: var(--accent); }
      .btn-secondary { background: var(--secondary); color: var(--foreground); }
      .btn-secondary:hover { background: rgb(245 245 245 / 0.8); }
      .btn-destructive { background: var(--destructive); color: #fff; }
      .btn-destructive:hover { background: rgb(212 24 61 / 0.9); }
      .btn-sm { height: 36px; padding: 0 12px; font-size: 14px; gap: 6px; }
      .btn-xs { height: 24px; padding: 0 8px; font-size: 12px; gap: 4px; border-radius: 8px; }

      .day-btn {
        height: 36px;
        flex: 1 1 0;
        min-width: 0;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--background);
        font-size: 13px;
        font-weight: 500;
        color: var(--foreground);
        cursor: pointer;
        transition: all 0.12s;
        padding: 0 6px;
        box-shadow: var(--shadow-xs);
      }
      .day-btn:hover { background: var(--accent); }
      .day-btn.on { background: var(--primary); color: var(--primary-fg); border-color: var(--primary); }

      .dom-btn {
        height: 32px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--background);
        font-size: 12px;
        font-weight: 500;
        color: var(--foreground);
        cursor: pointer;
        transition: all 0.12s;
        box-shadow: var(--shadow-xs);
      }
      .dom-btn:hover { background: var(--accent); }
      .dom-btn.on { background: var(--primary); color: var(--primary-fg); border-color: var(--primary); }

      .checkbox {
        appearance: none;
        width: 16px; height: 16px;
        border: 1px solid var(--border);
        border-radius: 4px; background: #fff;
        cursor: pointer; position: relative; flex-shrink: 0;
      }
      .checkbox:checked { background: var(--primary); border-color: var(--primary); }
      .checkbox:checked::after {
        content: ""; position: absolute; left: 4px; top: 1px;
        width: 5px; height: 9px;
        border: solid #fff; border-width: 0 2px 2px 0;
        transform: rotate(45deg);
      }

      /* Switch — green when on (matches ToggleSwitch component) */
      .switch {
        position: relative;
        width: 40px; height: 24px;
        background: var(--muted); border: 1px solid var(--border);
        border-radius: 999px;
        cursor: pointer; flex-shrink: 0;
        transition: background 0.15s, border-color 0.15s;
      }
      .switch::after {
        content: ""; position: absolute; top: 2px; left: 2px;
        width: 18px; height: 18px; border-radius: 50%;
        background: #fff; box-shadow: 0 1px 3px rgb(0 0 0 / 0.2);
        transition: transform 0.15s;
      }
      .switch.on { background: var(--switch-on); border-color: var(--switch-on); }
      .switch.on::after { transform: translateX(16px); }

      /* Badge — matches BadgeVariants. Default=primary solid, secondary=muted, outline=border-only */
      .badge {
        display: inline-flex; align-items: center; gap: 4px;
        padding: 2px 8px; border-radius: 999px;
        background: var(--secondary); color: var(--foreground);
        font-size: 12px; font-weight: 500; line-height: 1.25;
        border: 1px solid transparent;
        white-space: nowrap;
      }
      .badge-outline { background: transparent; border-color: var(--border); color: var(--foreground); }
      .badge-solid { background: var(--primary); color: var(--primary-fg); border-color: var(--primary); }
      .badge-good { background: rgb(22 163 74 / 0.1); border-color: rgb(22 163 74 / 0.25); color: #15803d; }
      .badge-warn { background: rgb(217 119 87 / 0.1); border-color: rgb(217 119 87 / 0.3); color: #9a3412; }
      .badge-dim { background: var(--secondary); border-color: transparent; color: var(--muted-fg); }

      .divider { height: 1px; background: var(--border); }
      details > summary { list-style: none; cursor: pointer; outline: none; }
      details > summary::-webkit-details-marker { display: none; }
      .dim { color: var(--muted-fg); }

      /* Trigger card — matches ui TriggerEditor wrapper: rounded-lg border p-4
         (rounded-lg in Paperclip = 0px because --radius-lg is overridden in globals.css) */
      .trigger-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 0;
        padding: 16px;
        transition: border-color 0.12s, box-shadow 0.12s;
      }
      .trigger-card:hover { border-color: #d4d4d4; }
      .trigger-card.disabled { background: var(--secondary); }
      .trigger-card.disabled .trigger-title { color: var(--muted-fg); }

      .icon-bubble {
        width: 36px; height: 36px;
        border-radius: 8px;
        display: inline-flex; align-items: center; justify-content: center;
        background: var(--secondary);
        color: var(--muted-fg);
        flex-shrink: 0;
      }

      /* Modal — matches ui Dialog: rounded-lg = 0px in Paperclip's theme */
      .modal-backdrop {
        position: fixed; inset: 0;
        background: rgb(0 0 0 / 0.5);
        z-index: 100;
        display: flex; align-items: center; justify-content: center;
        padding: 16px;
      }
      .modal {
        background: var(--background);
        border: 1px solid var(--border);
        border-radius: 0;
        width: 100%; max-width: 720px;
        max-height: calc(100vh - 32px);
        overflow: hidden;
        display: flex; flex-direction: column;
        box-shadow: var(--shadow-lg);
      }
      .modal-header {
        padding: 20px 24px 16px;
        display: flex; align-items: flex-start; justify-content: space-between;
        gap: 16px;
      }
      .modal-title { font-size: 18px; font-weight: 600; line-height: 1; }
      .modal-desc { font-size: 14px; color: var(--muted-fg); margin-top: 6px; }
      .modal-body { padding: 24px; overflow-y: auto; flex: 1; }
      .modal-footer {
        padding: 16px 24px;
        border-top: 1px solid var(--border);
        display: flex; justify-content: space-between; align-items: center;
        gap: 8px;
        background: var(--background);
      }

      /* Layout helpers */
      .editor-grid {
        display: grid;
        gap: 24px;
        grid-template-columns: 1fr;
      }
      @media (min-width: 760px) {
        .editor-grid { grid-template-columns: minmax(0, 1fr) 280px; align-items: start; }
      }

      /* Tabs — matches ui Tabs "line" variant */
      .tabs {
        display: flex;
        gap: 4px;
        border-bottom: 1px solid var(--border);
        padding: 0;
      }
      .tab {
        position: relative;
        padding: 8px 12px;
        font-size: 14px; font-weight: 500;
        color: rgb(37 37 37 / 0.6);
        cursor: pointer; background: none; border: none;
        transition: color 0.12s;
      }
      .tab:hover { color: var(--foreground); }
      .tab.active { color: var(--foreground); }
      .tab.active::after {
        content: "";
        position: absolute;
        left: 0; right: 0;
        bottom: -1px;
        height: 2px;
        background: var(--foreground);
      }

      /* Empty state — square corners (rounded-lg = 0px in Paperclip) */
      .empty {
        border: 1px dashed var(--border);
        border-radius: 0;
        padding: 40px 20px;
        text-align: center;
        background: var(--secondary);
      }

      /* Toast */
      .toast-stack { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 8px; z-index: 200; }
      .toast {
        background: var(--primary); color: var(--primary-fg);
        padding: 10px 16px; border-radius: 8px; font-size: 14px;
        font-weight: 500;
        box-shadow: var(--shadow-lg);
        animation: slideIn 0.15s ease;
      }
      @keyframes slideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
  </head>
  <body>
    <!-- Page header (mimics RoutineDetail chrome) -->
    <header class="border-b" style="border-color: var(--border)">
      <div class="max-w-5xl mx-auto px-4 sm:px-6 py-6">
        <div class="text-xs mono mb-2 dim">routines / morning-digest</div>
        <h1 class="text-xl sm:text-2xl font-semibold tracking-tight">Morning digest</h1>
        <p class="hint mt-1">Aggregates overnight activity and posts to #ops by 9am.</p>
        <div class="tabs mt-5">
          <button class="tab">Overview</button>
          <button class="tab active">Triggers</button>
          <button class="tab">Runs</button>
          <button class="tab">Activity</button>
          <button class="tab">Settings</button>
        </div>
      </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 sm:px-6 py-8">
      <!-- Triggers tab content -->
      <div class="flex items-start justify-between gap-4 mb-5 flex-wrap">
        <div>
          <h2 class="text-lg font-semibold">Triggers</h2>
          <p class="hint mt-0.5">Schedules and webhooks that fire this routine.</p>
        </div>
        <button id="add-trigger" class="btn btn-primary btn-sm">+ Add trigger</button>
      </div>

      <div id="triggers-list"></div>
    </main>

    <div id="modal-root"></div>
    <div class="toast-stack" id="toasts"></div>

    <script>
      // ============================================================
      // CRON UTILITIES
      // ============================================================
      const DAY_NAMES_SHORT = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
      const DAY_NAMES_LONG = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
      const DAY_NAMES_MIN = ["S","M","T","W","T","F","S"];
      const MONTH_NAMES = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
      const TIMEZONES = [
        "Europe/Amsterdam","Europe/London","Europe/Berlin","Europe/Paris","UTC",
        "America/New_York","America/Chicago","America/Denver","America/Los_Angeles",
        "America/Sao_Paulo","Asia/Tokyo","Asia/Singapore","Asia/Kolkata","Asia/Dubai",
        "Australia/Sydney",
      ];
      const pad = (n) => String(n).padStart(2, "0");
      const uid = () => "trg_" + Math.random().toString(36).slice(2, 10);

      function parseCronField(field, min, max) {
        if (field === "*" || field === "?") {
          return Array.from({ length: max - min + 1 }, (_, i) => i + min);
        }
        const out = new Set();
        for (const p of field.split(",")) {
          const sm = p.match(/^(.+)\/(\d+)$/);
          let base = p, step = 1;
          if (sm) { base = sm[1]; step = parseInt(sm[2]); }
          if (base === "*") { for (let i = min; i <= max; i += step) out.add(i); }
          else if (base.includes("-")) {
            const [a, b] = base.split("-").map(Number);
            for (let i = a; i <= b; i += step) out.add(i);
          } else {
            const n = parseInt(base);
            if (!isNaN(n) && n >= min && n <= max) out.add(n);
          }
        }
        return [...out].sort((a, b) => a - b);
      }
      function parseCron(cron) {
        const f = (cron || "").trim().split(/\s+/);
        if (f.length !== 5) throw new Error("Cron must be 5 fields");
        const [m, h, dom, mon, dow] = f;
        return {
          minutes: parseCronField(m, 0, 59),
          hours: parseCronField(h, 0, 23),
          daysOfMonth: parseCronField(dom, 1, 31),
          months: parseCronField(mon, 1, 12),
          daysOfWeek: parseCronField(dow.replace(/7/g, "0"), 0, 6),
          raw: { m, h, dom, mon, dow },
        };
      }
      function isValidCron(cron) {
        try {
          const p = parseCron(cron);
          return p.minutes.length && p.hours.length && p.daysOfMonth.length && p.months.length && p.daysOfWeek.length;
        } catch { return false; }
      }
      function nextRuns(cron, n = 5, from = new Date()) {
        let parts; try { parts = parseCron(cron); } catch { return []; }
        const runs = []; const d = new Date(from);
        d.setSeconds(0, 0); d.setMinutes(d.getMinutes() + 1);
        let s = 0; const max = 60 * 24 * 366 * 4;
        while (runs.length < n && s < max) {
          s++;
          if (parts.minutes.includes(d.getMinutes()) &&
              parts.hours.includes(d.getHours()) &&
              parts.daysOfMonth.includes(d.getDate()) &&
              parts.months.includes(d.getMonth() + 1) &&
              parts.daysOfWeek.includes(d.getDay())) runs.push(new Date(d));
          d.setMinutes(d.getMinutes() + 1);
        }
        return runs;
      }
      function formatRun(d) {
        const today = new Date(); const tomorrow = new Date(today.getTime() + 86400000);
        const same = (a, b) => a.toDateString() === b.toDateString();
        let day;
        if (same(d, today)) day = "Today";
        else if (same(d, tomorrow)) day = "Tomorrow";
        else day = `${DAY_NAMES_SHORT[d.getDay()]} ${d.getDate()} ${MONTH_NAMES[d.getMonth()]}`;
        return { day, time: `${pad(d.getHours())}:${pad(d.getMinutes())}` };
      }
      function relativeTime(d) {
        if (!d) return "—";
        const diff = (Date.now() - d.getTime()) / 1000;
        if (diff < 60) return "just now";
        if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
        if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
        if (diff < 86400 * 7) return `${Math.floor(diff/86400)}d ago`;
        return `${d.getDate()} ${MONTH_NAMES[d.getMonth()]}`;
      }
      function ordinal(n) { const s=["th","st","nd","rd"]; const v=n%100; return n + (s[(v-20)%10]||s[v]||s[0]); }
      function describeSchedule(cron) {
        let p; try { p = parseCron(cron); } catch { return "Invalid schedule"; }
        const r = p.raw; const { minutes, hours, daysOfWeek, daysOfMonth } = p;
        if (minutes.length === 60 && hours.length === 24) return "Every minute";
        const minStep = r.m.match(/^\*\/(\d+)$/);
        if (minStep && hours.length === 24 && r.dom === "*" && r.dow === "*") return `Every ${minStep[1]} minutes`;
        if (minutes.length === 1 && hours.length === 24 && r.dom === "*" && r.dow === "*") return `Every hour at :${pad(minutes[0])}`;
        const hourStep = r.h.match(/^\*\/(\d+)$/);
        if (hourStep && minutes.length === 1 && r.dom === "*" && r.dow === "*") return `Every ${hourStep[1]} hours at :${pad(minutes[0])}`;
        const hourRange = r.h.match(/^(\d+)-(\d+)$/);
        if (minStep && hourRange && r.dom === "*") {
          const dp = r.dow === "1-5" ? "weekdays" : r.dow === "*" ? "every day" : "selected days";
          return `Every ${minStep[1]} minutes between ${pad(+hourRange[1])}:00 and ${pad(+hourRange[2])}:00, ${dp}`;
        }
        let dayPart = "";
        if (r.dom === "*" && r.dow === "*") dayPart = "every day";
        else if (r.dom === "*" && r.dow === "1-5") dayPart = "every weekday";
        else if (r.dom === "*" && (r.dow === "0,6" || r.dow === "6,0")) dayPart = "every weekend";
        else if (r.dom === "*") {
          if (daysOfWeek.length === 1) dayPart = `every ${DAY_NAMES_LONG[daysOfWeek[0]]}`;
          else dayPart = `every ${daysOfWeek.map((d) => DAY_NAMES_SHORT[d]).join(", ")}`;
        } else if (r.dow === "*") {
          if (daysOfMonth.length === 1) dayPart = `on the ${ordinal(daysOfMonth[0])} of the month`;
          else dayPart = `on the ${daysOfMonth.map(ordinal).join(", ")} of the month`;
        }
        const times = [];
        for (const h of hours) for (const mi of minutes) times.push(`${pad(h)}:${pad(mi)}`);
        let timePart = "";
        if (times.length === 1) timePart = `at ${times[0]}`;
        else if (times.length <= 4) timePart = `at ${times.slice(0, -1).join(", ")} and ${times[times.length - 1]}`;
        else timePart = `${times.length} times per day`;
        return `${dayPart} ${timePart}`.replace(/\s+/g, " ").trim().replace(/^./, c => c.toUpperCase());
      }
      function buildCron({ minutes, hours, dom = "*", mon = "*", dow }) {
        const fmt = (v) => Array.isArray(v) ? (v.length === 0 ? "*" : v.join(",")) : v;
        return `${fmt(minutes)} ${fmt(hours)} ${fmt(dom)} ${fmt(mon)} ${fmt(dow)}`;
      }

      // ============================================================
      // STATE — TRIGGER STORE
      // ============================================================
      const STORAGE_KEY = "paperclip-triggers-mock-v1";

      function defaultTriggers() {
        return [
          {
            id: uid(), kind: "schedule", label: "Weekday morning digest",
            cronExpression: "0 9 * * 1-5", timezone: "Europe/Amsterdam",
            enabled: true,
            lastFiredAt: new Date(Date.now() - 3 * 3600 * 1000).toISOString(),
            lastResult: "success",
          },
          {
            id: uid(), kind: "schedule", label: "Hourly health check",
            cronExpression: "0 * * * *", timezone: "UTC",
            enabled: true,
            lastFiredAt: new Date(Date.now() - 22 * 60 * 1000).toISOString(),
            lastResult: "success",
          },
          {
            id: uid(), kind: "webhook", label: "GitHub deploy hook",
            cronExpression: null, timezone: null,
            enabled: false,
            publicId: "wh_3f9a82c4",
            lastFiredAt: new Date(Date.now() - 6 * 86400 * 1000).toISOString(),
            lastResult: "error: signature mismatch",
          },
        ];
      }

      function load() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (raw) return JSON.parse(raw);
        } catch {}
        return defaultTriggers();
      }
      function save() {
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(triggers)); } catch {}
      }

      let triggers = load();

      // ============================================================
      // TOASTS
      // ============================================================
      function toast(msg) {
        const stack = document.getElementById("toasts");
        const el = document.createElement("div");
        el.className = "toast";
        el.textContent = msg;
        stack.appendChild(el);
        setTimeout(() => { el.style.opacity = "0"; el.style.transition = "opacity 0.3s"; }, 2200);
        setTimeout(() => el.remove(), 2600);
      }

      // ============================================================
      // RENDER TRIGGER LIST
      // ============================================================
      const listRoot = document.getElementById("triggers-list");

      function renderList() {
        if (triggers.length === 0) {
          listRoot.innerHTML = `
            <div class="empty">
              <div class="text-sm font-medium mb-1">No triggers yet</div>
              <div class="hint mb-4">Triggers fire this routine on a schedule or via webhook.</div>
              <button class="btn btn-primary btn-sm" id="empty-add">+ Add your first trigger</button>
            </div>
          `;
          document.getElementById("empty-add").addEventListener("click", openAdd);
          return;
        }

        listRoot.innerHTML = `<div class="space-y-3">${triggers.map(triggerRow).join("")}</div>`;

        // wire row interactions
        triggers.forEach((t) => {
          const row = listRoot.querySelector(`[data-trigger-id="${t.id}"]`);
          if (!row) return;
          row.querySelector("[data-act='toggle']").addEventListener("click", () => toggleTrigger(t.id));
          row.querySelector("[data-act='edit']").addEventListener("click", () => openEdit(t.id));
          row.querySelector("[data-act='delete']").addEventListener("click", () => confirmDelete(t.id));
          const rotate = row.querySelector("[data-act='rotate']");
          if (rotate) rotate.addEventListener("click", () => rotateSecret(t.id));
        });
      }

      function triggerRow(t) {
        const isSchedule = t.kind === "schedule";
        const validCron = isSchedule && isValidCron(t.cronExpression);
        const summary = isSchedule
          ? (validCron ? describeSchedule(t.cronExpression) : "Invalid cron expression")
          : `Webhook · ${t.publicId || "—"}`;
        const next = isSchedule && validCron && t.enabled ? nextRuns(t.cronExpression, 1)[0] : null;
        const nextStr = next ? `${formatRun(next).day} ${formatRun(next).time}` : (t.enabled ? "—" : "Disabled");
        const last = t.lastFiredAt ? new Date(t.lastFiredAt) : null;
        const lastStr = last ? relativeTime(last) : "Never";
        const lastBadge = !t.lastResult ? "" :
          t.lastResult.startsWith("error") ? `<span class="badge badge-warn">${t.lastResult}</span>`
          : `<span class="badge badge-good">${t.lastResult}</span>`;

        return `
          <div class="trigger-card ${t.enabled ? "" : "disabled"}" data-trigger-id="${t.id}">
            <div class="flex items-start gap-3">
              <span class="icon-bubble" title="${t.kind}">${kindIcon(t.kind)}</span>

              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2 flex-wrap">
                  <span class="trigger-title text-sm font-medium">${escapeHtml(t.label || (isSchedule ? "Schedule" : "Webhook"))}</span>
                  <span class="badge badge-outline">${t.kind}</span>
                  ${t.enabled ? "" : `<span class="badge badge-dim">paused</span>`}
                </div>
                <div class="text-sm mt-1.5">${escapeHtml(summary)}</div>
                ${isSchedule ? `<div class="hint mt-1"><span class="mono">${t.cronExpression}</span> · ${t.timezone || "UTC"}</div>` : ""}

                <div class="grid sm:grid-cols-3 gap-3 mt-4 text-xs">
                  <div>
                    <div class="hint mb-0.5">Next run</div>
                    <div>${nextStr}</div>
                  </div>
                  <div>
                    <div class="hint mb-0.5">Last fired</div>
                    <div>${lastStr}</div>
                  </div>
                  <div>
                    <div class="hint mb-0.5">Last result</div>
                    <div>${lastBadge || "—"}</div>
                  </div>
                </div>
              </div>

              <div class="flex flex-col items-end gap-3">
                <button class="switch ${t.enabled ? "on" : ""}" data-act="toggle" title="${t.enabled ? "Disable" : "Enable"}"></button>
                <div class="flex gap-1">
                  ${t.kind === "webhook" ? `<button class="btn btn-ghost btn-xs" data-act="rotate" title="Rotate secret">Rotate</button>` : ""}
                  <button class="btn btn-ghost btn-xs" data-act="edit" title="Edit">Edit</button>
                  <button class="btn btn-ghost btn-xs" data-act="delete" title="Delete" style="color: var(--destructive)">Delete</button>
                </div>
              </div>
            </div>
          </div>
        `;

      function kindIcon(kind) {
        if (kind === "schedule") {
          return `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/></svg>`;
        }
        return `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 16.98h-5.99c-1.1 0-1.95.94-2.48 1.9A4 4 0 0 1 2 17c.01-.7.2-1.4.57-2"/><path d="m6 17 3.13-5.78c.53-.97.43-2.22-.26-3.07A4 4 0 0 1 17 6.05c.06.4.05.8-.03 1.2"/><path d="m12 6 .94 5.06A4 4 0 1 1 9 17"/></svg>`;
      }

      function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

      // ============================================================
      // CRUD ACTIONS
      // ============================================================
      function toggleTrigger(id) {
        const t = triggers.find(x => x.id === id);
        if (!t) return;
        t.enabled = !t.enabled;
        save(); renderList();
        toast(`${t.label || t.kind} ${t.enabled ? "enabled" : "disabled"}`);
      }
      function deleteTrigger(id) {
        const t = triggers.find(x => x.id === id);
        triggers = triggers.filter(x => x.id !== id);
        save(); renderList();
        toast(`Deleted "${t?.label || "trigger"}"`);
      }
      function rotateSecret(id) {
        toast(`Webhook secret rotated`);
      }
      function confirmDelete(id) {
        const t = triggers.find(x => x.id === id);
        openConfirmModal(
          `Delete trigger?`,
          `"${t.label || t.kind}" will be removed. This can't be undone.`,
          "Delete",
          () => deleteTrigger(id)

      // ============================================================
      // MODAL — CONFIRM
      // ============================================================
      function openConfirmModal(title, body, confirmLabel, onConfirm) {
        const root = document.getElementById("modal-root");
        root.innerHTML = `
          <div class="modal-backdrop">
            <div class="modal" style="max-width: 420px">
              <div class="modal-header">
                <div>
                  <div class="modal-title">${escapeHtml(title)}</div>
                  <div class="modal-desc">${escapeHtml(body)}</div>
                </div>
              </div>
              <div class="modal-footer" style="border-top: none; padding-top: 4px">
                <span></span>
                <div class="flex gap-2">
                  <button class="btn btn-outline btn-sm" id="cm-cancel">Cancel</button>
                  <button class="btn btn-destructive btn-sm" id="cm-ok">${escapeHtml(confirmLabel)}</button>
                </div>
              </div>
            </div>
          </div>
        `;
        document.getElementById("cm-cancel").addEventListener("click", closeModal);
        document.getElementById("cm-ok").addEventListener("click", () => { onConfirm(); closeModal(); });
        document.querySelector(".modal-backdrop").addEventListener("click", (e) => {
          if (e.target.classList.contains("modal-backdrop")) closeModal();
        });
      }
      function closeModal() {
        document.getElementById("modal-root").innerHTML = "";
      }

      // ============================================================
      // MODAL — TRIGGER FORM
      // ============================================================
      let editorState = null; // current form state

      function blankSchedule() {
        return {
          id: null, kind: "schedule", label: "", enabled: true,
          cronExpression: "0 9 * * 1-5", timezone: "Europe/Amsterdam",
          // editor working state
          preset: "weekdays",
          n: 15, windowEnabled: false, windowStart: 9, windowEnd: 17, weekdaysOnly: false,
          minutePast: 0,
          times: ["09:00"],
          days: [1, 2, 3, 4, 5],
          domDays: [1],
          custom: "0 9 * * 1-5",
        };
      }

      function fromExisting(t) {
        const s = blankSchedule();
        Object.assign(s, {
          id: t.id, kind: t.kind, label: t.label || "", enabled: t.enabled,
          cronExpression: t.cronExpression, timezone: t.timezone || "Europe/Amsterdam",
        });
        // try to deduce a sensible preset for editing — fall back to custom
        if (t.kind === "schedule" && t.cronExpression && isValidCron(t.cronExpression)) {
          inferPresetFromCron(s, t.cronExpression);
        }
        return s;
      }

      function inferPresetFromCron(s, cron) {
        const f = cron.trim().split(/\s+/);
        const [m, h, dom, mon, dow] = f;
        // every minute
        if (cron === "* * * * *") { s.preset = "every_minute"; return; }
        // every N minutes
        const minStep = m.match(/^\*\/(\d+)$/);
        if (minStep && h === "*" && dom === "*" && mon === "*") {
          s.preset = "every_n_minutes"; s.n = +minStep[1];
          s.weekdaysOnly = dow === "1-5"; return;
        }
        // hourly
        if (/^\d+$/.test(m) && h === "*" && dom === "*" && dow === "*") {
          s.preset = "hourly"; s.minutePast = +m; return;
        }
        // every N hours
        const hourStep = h.match(/^\*\/(\d+)$/);
        if (/^\d+$/.test(m) && hourStep && dom === "*") {
          s.preset = "every_n_hours"; s.n = +hourStep[1]; s.minutePast = +m;
          s.weekdaysOnly = dow === "1-5"; return;
        }
        // monthly (specific dom, dow=*)
        if (dom !== "*" && dow === "*") {
          s.preset = "monthly";
          s.domDays = parseCronField(dom, 1, 31);
          s.times = timesFromMH(m, h); return;
        }
        // weekdays (specific dow)
        if (dom === "*" && dow !== "*") {
          s.preset = "weekdays";
          s.days = parseCronField(dow.replace(/7/g, "0"), 0, 6);
          s.times = timesFromMH(m, h); return;
        }
        // every day
        if (dom === "*" && dow === "*") {
          s.preset = "every_day";
          s.times = timesFromMH(m, h); return;
        }
        s.preset = "custom"; s.custom = cron;
      }

      function timesFromMH(mField, hField) {
        const minutes = parseCronField(mField, 0, 59);
        const hours = parseCronField(hField, 0, 23);
        const out = [];
        for (const h of hours) for (const mi of minutes) out.push(`${pad(h)}:${pad(mi)}`);
        return out.length ? out.slice(0, 12) : ["09:00"]; // cap
      }

      function buildCronFromEditor(s) {
        switch (s.preset) {
          case "every_minute": return "* * * * *";
          case "every_n_minutes": {
            const hourField = s.windowEnabled ? `${s.windowStart}-${s.windowEnd}` : "*";
            const dowField = s.weekdaysOnly ? "1-5" : "*";
            return `*/${s.n} ${hourField} * * ${dowField}`;
          }
          case "hourly": return `${s.minutePast} * * * *`;
          case "every_n_hours": {
            const dowField = s.weekdaysOnly ? "1-5" : "*";
            return `${s.minutePast} */${s.n} * * ${dowField}`;
          }
          case "every_day": {
            const minutes = [...new Set(s.times.map((t) => +t.split(":")[1]))].sort((a,b)=>a-b);
            const hours = [...new Set(s.times.map((t) => +t.split(":")[0]))].sort((a,b)=>a-b);
            return buildCron({ minutes, hours, dow: "*" });
          }
          case "weekdays": {
            const minutes = [...new Set(s.times.map((t) => +t.split(":")[1]))].sort((a,b)=>a-b);
            const hours = [...new Set(s.times.map((t) => +t.split(":")[0]))].sort((a,b)=>a-b);
            const dow = s.days.length === 0 ? "*" : s.days.slice().sort().join(",");
            return buildCron({ minutes, hours, dow });
          }
          case "monthly": {
            const minutes = [...new Set(s.times.map((t) => +t.split(":")[1]))].sort((a,b)=>a-b);
            const hours = [...new Set(s.times.map((t) => +t.split(":")[0]))].sort((a,b)=>a-b);
            const dom = s.domDays.length === 0 ? [1] : s.domDays.slice().sort((a,b)=>a-b);
            return buildCron({ minutes, hours, dom, dow: "*" });
          }
          case "custom": return s.custom;
        }
      }

      function openAdd() {
        editorState = blankSchedule();
        renderEditorModal("Add trigger", "Create");
      }
      function openEdit(id) {
        const t = triggers.find(x => x.id === id);
        if (!t) return;
        if (t.kind === "webhook") { toast("Webhook editor coming soon"); return; }
        editorState = fromExisting(t);
        renderEditorModal("Edit trigger", "Save changes");
      }

      function renderEditorModal(title, ctaLabel) {
        const root = document.getElementById("modal-root");
        root.innerHTML = `
          <div class="modal-backdrop">
            <div class="modal">
              <div class="modal-header" style="border-bottom: 1px solid var(--border); padding-bottom: 20px">

                  <div class="modal-desc">Configure when and how this routine fires.</div>
                </div>
                <button class="btn btn-ghost btn-xs" id="modal-close" aria-label="Close" style="height: 28px; width: 28px; padding: 0">✕</button>
              </div>
              <div class="modal-body">
                <div class="space-y-5">
                  <div>
                    <label class="label block mb-1.5" for="lbl">Label</label>

                    <div class="hint mt-1">Shown in the trigger list. Optional.</div>
                  </div>
                  <div>
                    <label class="label block mb-1.5" for="kind">Kind</label>

                  <span>Enabled</span>
                </label>
                <div class="flex gap-2">
                  <button class="btn btn-outline btn-sm" id="cancel-btn">Cancel</button>
                  <button class="btn btn-primary btn-sm" id="save-btn">${escapeHtml(ctaLabel)}</button>
                </div>
              </div>
            </div>
          </div>
        `;
        renderEditorArea();

        document.getElementById("lbl").addEventListener("input", (e) => { editorState.label = e.target.value; });
        document.getElementById("kind").addEventListener("change", (e) => { editorState.kind = e.target.value; });
        document.getElementById("enabled-switch").addEventListener("click", function() {
          editorState.enabled = !editorState.enabled;
          this.classList.toggle("on", editorState.enabled);
        });
        document.getElementById("cancel-btn").addEventListener("click", closeModal);
        document.getElementById("modal-close").addEventListener("click", closeModal);
        document.getElementById("save-btn").addEventListener("click", saveTrigger);
        document.querySelector(".modal-backdrop").addEventListener("click", (e) => {
          if (e.target.classList.contains("modal-backdrop")) closeModal();
        });
      }

      function saveTrigger() {
        const cron = buildCronFromEditor(editorState);
        if (!isValidCron(cron)) { toast("Invalid cron expression"); return; }
        if (editorState.id) {
          // update
          const t = triggers.find(x => x.id === editorState.id);
          Object.assign(t, {
            label: editorState.label, enabled: editorState.enabled,
            cronExpression: cron, timezone: editorState.timezone,
          });
          toast("Trigger saved");
        } else {
          triggers.push({
            id: uid(), kind: "schedule",
            label: editorState.label || "Schedule",
            enabled: editorState.enabled,
            cronExpression: cron, timezone: editorState.timezone,
            lastFiredAt: null, lastResult: null,
          });
          toast("Trigger added");
        }
        save(); closeModal(); renderList();
      }

      // ============================================================
      // SCHEDULE EDITOR (inside modal)
      // ============================================================
      function renderEditorArea() {
        const s = editorState;
        const cron = buildCronFromEditor(s);
        const valid = isValidCron(cron);
        const area = document.getElementById("editor-area");

        area.innerHTML = `
          <div class="editor-grid">
            <div class="space-y-5 min-w-0">
              <div>
                <label class="label block mb-1.5" for="preset">Schedule</label>
                <select id="preset" class="select">
                  <option value="every_minute">Every minute</option>
                  <option value="every_n_minutes">Every N minutes</option>
                  <option value="hourly">Hourly</option>
                  <option value="every_n_hours">Every N hours</option>
                  <option value="every_day">Daily — at one or more times</option>
                  <option value="weekdays">On selected weekdays</option>
                  <option value="monthly">Monthly — on selected dates</option>
                  <option value="custom">Custom (cron expression)</option>
                </select>
              </div>
              <div id="preset-body" class="space-y-5"></div>
              <div>
                <label class="label block mb-1.5" for="tz">Timezone</label>
                <select id="tz" class="select">
                  ${TIMEZONES.map((t) => `<option ${t === s.timezone ? "selected" : ""}>${t}</option>`).join("")}
                </select>
              </div>
              <details>
                <summary class="hint hover:underline">Advanced — view raw cron expression</summary>
                <input id="raw-cron" class="input mono text-sm mt-2 ${valid ? "" : "invalid"}" value="${cron}" />
                <div class="hint mt-1">${valid ? "Edit above to bypass the form" : "Invalid — five space-separated fields required"}</div>
              </details>
            </div>

            <aside>
              <div class="card p-4" style="background: #fafafa">
                <div class="hint mb-1">Summary</div>
                <div class="text-sm font-medium leading-snug">${valid ? describeSchedule(cron) : "—"}</div>
                <div class="hint mt-1 mono">${s.timezone}</div>
                <div class="divider my-3"></div>
                <div class="hint mb-2">Next runs</div>
                <ul id="next-runs" class="space-y-0.5"></ul>
                <div class="divider my-3"></div>
                <div class="flex items-center justify-between gap-2">
                  <span class="hint mono" style="overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0;">${cron}</span>
                  <span class="badge ${valid ? "badge-good" : "badge-warn"}">${valid ? "Valid" : "Invalid"}</span>
                </div>
              </div>
            </aside>
          </div>
        `;

        document.getElementById("preset").value = s.preset;
        renderPresetBody();
        renderNextRunsPreview(cron);

        document.getElementById("preset").addEventListener("change", (e) => { s.preset = e.target.value; renderEditorArea(); });
        document.getElementById("tz").addEventListener("change", (e) => { s.timezone = e.target.value; renderEditorArea(); });
        const raw = document.getElementById("raw-cron");
        if (raw) raw.addEventListener("input", (e) => {
          s.custom = e.target.value;
          if (s.preset !== "custom") s.preset = "custom";
          renderEditorArea();
        });
      }

      function renderNextRunsPreview(cron) {
        const el = document.getElementById("next-runs");
        const runs = nextRuns(cron, 4);
        if (runs.length === 0) { el.innerHTML = '<li class="hint">No upcoming runs</li>'; return; }
        el.innerHTML = runs.map((r) => {
          const f = formatRun(r);
          return `<li class="flex justify-between text-sm"><span>${f.day}</span><span class="mono dim">${f.time}</span></li>`;
        }).join("");
      }

      function renderPresetBody() {
        const body = document.getElementById("preset-body");
        const s = editorState;
        switch (s.preset) {
          case "every_minute": body.innerHTML = `<div class="hint">No options — runs every minute, around the clock.</div>`; return;
          case "every_n_minutes": renderNMinutes(body); return;
          case "hourly": renderHourly(body); return;
          case "every_n_hours": renderNHours(body); return;
          case "every_day": renderDaily(body); return;
          case "weekdays": renderWeekdays(body); return;
          case "monthly": renderMonthly(body); return;
          case "custom":
            body.innerHTML = `
              <div>
                <label class="sublabel block mb-1.5">Cron expression</label>
                <input id="custom-cron" class="input mono text-sm" value="${s.custom}" />

              </div>`;
            document.getElementById("custom-cron").addEventListener("input", (e) => { s.custom = e.target.value; renderEditorArea(); });
            return;
        }
      }

      function renderNMinutes(body) {
        const s = editorState;
        body.innerHTML = `
          <div>
            <label class="sublabel block mb-1.5">Run every</label>

            <div class="flex flex-wrap gap-1.5 mt-2">
              ${[1, 5, 10, 15, 20, 30].map((v) => `<button class="badge" data-snap="${v}">${v}</button>`).join("")}
            </div>
          </div>
          ${windowAndWeekdaysHTML(s)}
        `;
        wireNAndWindow();
      }

      function renderNHours(body) {
        const s = editorState;
        body.innerHTML = `
          <div>
            <label class="sublabel block mb-1.5">Run every</label>
            <div class="flex items-center gap-2">
              <input id="n" type="number" class="input mono" style="width: 90px" min="1" max="23" value="${s.n}" />
              <span class="dim text-sm">hours</span>
            </div>
            <div class="flex flex-wrap gap-1.5 mt-2">
              ${[1, 2, 3, 4, 6, 8, 12].map((v) => `<button class="badge" data-snap="${v}">${v}</button>`).join("")}
            </div>
          </div>
          <div>
            <label class="sublabel block mb-1.5" for="mp">Minute past the hour</label>
            <input id="mp" type="number" class="input mono" style="width: 90px" min="0" max="59" value="${s.minutePast}" />
          </div>
          ${weekdaysOnlyHTML(s)}
        `;
        wireNAndWindow();
        document.getElementById("mp").addEventListener("input", (e) => { s.minutePast = clamp(+e.target.value, 0, 59); renderEditorArea(); });
      }

      function renderHourly(body) {
        const s = editorState;
        body.innerHTML = `
          <div>
            <label class="sublabel block mb-1.5" for="mp">Minute past the hour</label>
            <input id="mp" type="number" class="input mono" style="width: 90px" min="0" max="59" value="${s.minutePast}" />
            <div class="hint mt-1">Runs once an hour at <span class="mono">:${pad(s.minutePast)}</span></div>
          </div>`;
        document.getElementById("mp").addEventListener("input", (e) => { s.minutePast = clamp(+e.target.value, 0, 59); renderEditorArea(); });
      }

      function renderDaily(body) {
        body.innerHTML = `
          <div>
            <label class="sublabel block mb-2">Times of day</label>
            <div id="times" class="space-y-2">${timeRowsHTML()}</div>
            <button id="add-time" class="btn btn-outline btn-sm mt-2">+ Add time</button>
          </div>`;
        wireTimes();
      }

      function renderWeekdays(body) {
        const s = editorState;
        body.innerHTML = `
          <div>
            <label class="sublabel block mb-2">Days of the week</label>
            <div class="flex gap-1.5 mb-2">
              ${DAY_NAMES_MIN.map((l, i) =>
                `<button class="day-btn ${s.days.includes(i) ? "on" : ""}" data-day="${i}" title="${DAY_NAMES_LONG[i]}">${l}</button>`
              ).join("")}
            </div>
            <div class="flex flex-wrap gap-1.5">
              <button class="badge" data-preset-days="weekdays">Weekdays</button>
              <button class="badge" data-preset-days="weekends">Weekends</button>
              <button class="badge" data-preset-days="all">All days</button>
              <button class="badge" data-preset-days="mwf">Mon · Wed · Fri</button>
              <button class="badge" data-preset-days="tt">Tue · Thu</button>
            </div>
          </div>
          <div>
            <label class="sublabel block mb-2">Times of day</label>
            <div id="times" class="space-y-2">${timeRowsHTML()}</div>
            <button id="add-time" class="btn btn-outline btn-sm mt-2">+ Add time</button>
          </div>`;
        document.querySelectorAll("[data-day]").forEach((btn) => {
          btn.addEventListener("click", () => {
            const d = +btn.dataset.day;
            s.days = s.days.includes(d) ? s.days.filter((x) => x !== d) : [...s.days, d].sort();
            if (s.days.length === 0) s.days = [d];
            renderEditorArea();
          });
        });
        document.querySelectorAll("[data-preset-days]").forEach((btn) => {
          btn.addEventListener("click", () => {
            const map = { weekdays: [1,2,3,4,5], weekends: [0,6], all: [0,1,2,3,4,5,6], mwf: [1,3,5], tt: [2,4] };
            s.days = map[btn.dataset.presetDays] || s.days;
            renderEditorArea();
          });
        });
        wireTimes();
      }

      function renderMonthly(body) {
        const s = editorState;
        body.innerHTML = `
          <div>
            <label class="sublabel block mb-2">Days of the month</label>
            <div class="grid grid-cols-7 sm:grid-cols-10 gap-1.5">
              ${Array.from({ length: 31 }, (_, i) => i + 1).map((d) =>
                `<button class="dom-btn ${s.domDays.includes(d) ? "on" : ""}" data-dom="${d}">${d}</button>`
              ).join("")}
            </div>
            <div class="flex flex-wrap gap-1.5 mt-2">
              <button class="badge" data-preset-dom="first">1st only</button>
              <button class="badge" data-preset-dom="mid">15th only</button>
              <button class="badge" data-preset-dom="ends">1st &amp; 15th</button>
              <button class="badge" data-preset-dom="last">Last day (28th)</button>
            </div>
            <div class="hint mt-2">Days 29–31 are skipped in months that don't have them.</div>
          </div>
          <div>
            <label class="sublabel block mb-2">Times of day</label>
            <div id="times" class="space-y-2">${timeRowsHTML()}</div>
            <button id="add-time" class="btn btn-outline btn-sm mt-2">+ Add time</button>
          </div>`;
        document.querySelectorAll("[data-dom]").forEach((btn) => {
          btn.addEventListener("click", () => {
            const d = +btn.dataset.dom;
            s.domDays = s.domDays.includes(d) ? s.domDays.filter((x) => x !== d) : [...s.domDays, d].sort((a,b)=>a-b);
            if (s.domDays.length === 0) s.domDays = [d];
            renderEditorArea();
          });
        });
        document.querySelectorAll("[data-preset-dom]").forEach((btn) => {
          btn.addEventListener("click", () => {
            const map = { first: [1], mid: [15], ends: [1, 15], last: [28] };
            s.domDays = map[btn.dataset.presetDom] || s.domDays;
            renderEditorArea();
          });
        });
        wireTimes();
      }

      function timeRowsHTML() {
        const s = editorState;
        return s.times.map((t, i) => `
          <div class="flex gap-2 items-center">
            <input class="input mono" type="time" style="width: 130px" value="${t}" data-time-idx="${i}" />
            <button class="btn btn-ghost btn-sm" data-remove-time="${i}" ${s.times.length === 1 ? "disabled style='opacity:0.3;cursor:not-allowed'" : ""}>Remove</button>
          </div>
        `).join("");
      }

      function wireTimes() {
        const s = editorState;
        document.querySelectorAll("[data-time-idx]").forEach((inp) => {
          inp.addEventListener("input", (e) => { s.times[+inp.dataset.timeIdx] = e.target.value || "00:00"; renderEditorArea(); });
        });
        document.querySelectorAll("[data-remove-time]").forEach((btn) => {
          btn.addEventListener("click", () => { if (s.times.length > 1) { s.times.splice(+btn.dataset.removeTime, 1); renderEditorArea(); } });
        });
        const add = document.getElementById("add-time");
        if (add) add.addEventListener("click", () => { s.times.push("12:00"); renderEditorArea(); });
      }

      function windowAndWeekdaysHTML(s) {
        return `
          <div>
            <label class="flex items-center gap-2 cursor-pointer">
              <input id="window-toggle" type="checkbox" class="checkbox" ${s.windowEnabled ? "checked" : ""} />
              <span class="sublabel">Only between certain hours</span>
            </label>
            ${s.windowEnabled ? `
              <div class="flex items-center gap-2 mt-2 ml-6 flex-wrap">
                <select id="ws" class="select" style="width: 100px">
                  ${Array.from({length:24}, (_,i) => `<option value="${i}" ${i===s.windowStart?"selected":""}>${pad(i)}:00</option>`).join("")}
                </select>
                <span class="hint">to</span>
                <select id="we" class="select" style="width: 100px">
                  ${Array.from({length:24}, (_,i) => `<option value="${i}" ${i===s.windowEnd?"selected":""}>${pad(i)}:00</option>`).join("")}
                </select>
              </div>` : ""}
          </div>
          ${weekdaysOnlyHTML(s)}
        `;
      }

      function weekdaysOnlyHTML(s) {
        return `
          <div>
            <label class="flex items-center gap-2 cursor-pointer">
              <input id="weekdays-only" type="checkbox" class="checkbox" ${s.weekdaysOnly ? "checked" : ""} />
              <span class="sublabel">Weekdays only (Mon–Fri)</span>
            </label>
          </div>`;
      }

      function wireNAndWindow() {
        const s = editorState;
        const n = document.getElementById("n");
        if (n) n.addEventListener("input", (e) => {
          const max = s.preset === "every_n_minutes" ? 59 : 23;
          s.n = clamp(+e.target.value, 1, max); renderEditorArea();
        });
        document.querySelectorAll("[data-snap]").forEach((b) => {
          b.addEventListener("click", () => { s.n = +b.dataset.snap; renderEditorArea(); });
        });
        const wt = document.getElementById("window-toggle");
        if (wt) wt.addEventListener("change", (e) => { s.windowEnabled = e.target.checked; renderEditorArea(); });
        const ws = document.getElementById("ws");
        if (ws) ws.addEventListener("change", (e) => { s.windowStart = +e.target.value; renderEditorArea(); });
        const we = document.getElementById("we");
        if (we) we.addEventListener("change", (e) => { s.windowEnd = +e.target.value; renderEditorArea(); });
        const wo = document.getElementById("weekdays-only");
        if (wo) wo.addEventListener("change", (e) => { s.weekdaysOnly = e.target.checked; renderEditorArea(); });
      }

      function clamp(v, lo, hi) { return Math.min(Math.max(v, lo), hi); }

      // ============================================================
      // BOOT
      // ============================================================
      document.getElementById("add-trigger").addEventListener("click", openAdd);
      // Reset to defaults helper (for QA): press R to reset
      document.addEventListener("keydown", (e) => {
        if (e.key === "r" && e.shiftKey && e.altKey) {
          localStorage.removeItem(STORAGE_KEY);
          triggers = defaultTriggers();
          save(); renderList(); toast("Reset to demo triggers");
        }
        if (e.key === "Escape") closeModal();
      });
      renderList();
    </script>
  </body>
</html>
